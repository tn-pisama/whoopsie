name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm version comes from root package.json `packageManager` field
        # (pnpm@9.0.0). pnpm/action-setup@v4 rejects when both an explicit
        # `version:` input AND `packageManager` are set ("Multiple versions
        # of pnpm specified"), so we deliberately omit the input.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build must run before Typecheck + Test. apps/web depends on
      # @whoopsie/sdk and @whoopsie/detectors as workspace packages that ship
      # from their dist/ folders (the package.json has `"main": "./dist/..."`
      # and `"types": "./dist/..."`). Without dist/ populated, `tsc --noEmit`
      # on apps/web throws TS2307 ("Cannot find module '@whoopsie/sdk'"). The
      # same constraint bit Vercel's build (see vercel.json's three-dot
      # filter fix shipped on 2026-05-11).
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: pnpm -r --filter ./packages/* publish --access public --no-git-checks --provenance
