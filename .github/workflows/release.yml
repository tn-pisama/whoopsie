name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm version comes from root package.json `packageManager` field
        # (pnpm@9.0.0). pnpm/action-setup@v4 rejects when both an explicit
        # `version:` input AND `packageManager` are set ("Multiple versions
        # of pnpm specified"), so we deliberately omit the input.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm -r --filter ./packages/* publish --access public --no-git-checks --provenance
