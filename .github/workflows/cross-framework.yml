# Cross-framework regression CI for @whoopsie/sdk.
#
# Spins up a Vercel Sandbox per framework (Next.js, TanStack Start, Hono,
# Express), installs @whoopsie/sdk fresh from npm, runs a synthetic chat
# against the framework's route, asserts a trace lands on /live/<ci-id>.
# Catches SDK regressions before they reach users.
#
# Mock-model layer ACTIVE as of 2026-05-13 (Layer 3 of the platform-drift
# detection plan). Runs nightly at 06:00 UTC, on every push to main that
# touches packages/sdk/**, on every matching PR, and on workflow_dispatch.
# What it catches: upstream dep drift (ai@6 → ai@7, @ai-sdk/openai V2/V3
# spec changes, convertToModelMessages signature drift) and SDK regressions
# (return-without-wrapping, dropped events, exporter shape changes).
#
# Vercel Sandbox live-trace layer STILL INACTIVE — gated behind a separate
# `if: false` further down. To activate that richer layer:
#   1. Add repo secrets: OPENAI_API_KEY, VERCEL_TOKEN, WHOOPSIE_PROJECT_ID_CI
#   2. Remove the second `if: false` (line on the "Vercel Sandbox, live
#      trace" step)
# See .github/workflows/README.md for the full activation guide.

name: Cross-framework regression

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/**"
      - ".github/workflows/cross-framework.yml"
  pull_request:
    paths:
      - "packages/sdk/**"
      - ".github/workflows/cross-framework.yml"
  schedule:
    # Nightly at 06:00 UTC to catch upstream @ai-sdk/* breakage
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  framework-matrix:
    name: ${{ matrix.framework }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework:
          - nextjs
          - tanstack-start
          - hono
          - express

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm version comes from root package.json `packageManager` field.
        # pnpm/action-setup@v4 rejects when both an explicit `version:` input
        # AND `packageManager` are set, so we omit the input. (Same fix as
        # release.yml after the 2026-05-12 ci(release) regression.)
        #
        # IMPORTANT: Setup pnpm BEFORE setup-node — setup-node's `cache: pnpm`
        # option shells out to pnpm to compute the cache key, so pnpm must
        # already be on PATH. The reverse order silently disables cache.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @whoopsie/sdk build

      - name: Run framework integration test (mock model)
        # `pnpm --filter` runs the command from inside the SDK package's
        # working directory, where tsx is an explicit devDep. The cwd-less
        # form `pnpm exec tsx ...` only finds tsx if it's hoisted to the
        # root's node_modules/.bin, which pnpm's default isolated linker
        # does NOT do.
        run: pnpm --filter @whoopsie/sdk exec tsx test/integration/${{ matrix.framework }}/${{ matrix.framework }}.test.ts
        env:
          # Mock-model tests don't need a real OpenAI key, but the SDK looks
          # for these vars and we want the same env shape as live.
          WHOOPSIE_PROJECT_ID: ws_ci_${{ matrix.framework }}_${{ github.sha }}
          WHOOPSIE_SILENT: "1"

      - name: Run framework integration test (Vercel Sandbox, live trace)
        if: false # Active only after VERCEL_TOKEN + OPENAI_API_KEY secrets are set.
        run: pnpm exec tsx scripts/ci-sandbox-test.ts --framework ${{ matrix.framework }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHOOPSIE_PROJECT_ID: ${{ secrets.WHOOPSIE_PROJECT_ID_CI }}

      - name: Summarize
        if: always()
        run: |
          echo "### Framework: ${{ matrix.framework }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
